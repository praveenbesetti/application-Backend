services:
  # Changed from backend-api to survey-backend to match Nginx upstream
  survey-backend: 
    image: asia-south1-docker.pkg.dev/secure-487209/myfarmapp/backend-api:latest
    container_name: survey-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: survey-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - survey-backend # Matches the new service name above