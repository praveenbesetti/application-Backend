events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Define the backend connection
    upstream backend_api {
        server survey-backend:5000;
    }

    server {
        listen 80;
        server_name web-app-backend.duckdns.org;

        # Health check
        location /health {
            return 200 'Nginx is alive';
            add_header Content-Type text/plain;
        }

        # Proxy requests to your MERN backend
        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # SSL SECTION (Commented out with #)
    # server {
    #     listen 443 ssl;
    #     server_name web-app-backend.duckdns.org;
    #     ssl_certificate /etc/letsencrypt/live/web-app-backend.duckdns.org/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/web-app-backend.duckdns.org/privkey.pem;
    #     location / {
    #         proxy_pass http://backend_api;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #     }
    # }
}