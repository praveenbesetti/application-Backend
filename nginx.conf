events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name myfarmapp.duckdns.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name myfarmapp.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/myfarmapp.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfarmapp.duckdns.org/privkey.pem;

        location / {
            # Use a variable for the backend name to prevent startup crash
            set $target http://survey-backend:5000;
            proxy_pass $target;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}