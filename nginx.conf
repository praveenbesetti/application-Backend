events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    upstream backend_api {
        # Using the container name defined in docker-compose
        server survey-backend:5000;
    }

    # Redirect HTTP (Port 80) to HTTPS
    server {
        listen 80;
        server_name myfarmapp.duckdns.org;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Port 443)
    server {
        listen 443 ssl;
        server_name myfarmapp.duckdns.org;

        # SSL Certificates (Mounted from host via Docker volumes)
        ssl_certificate /etc/letsencrypt/live/myfarmapp.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfarmapp.duckdns.org/privkey.pem;

        # Proxy to the Node.js Backend
        location / {
            # Use a variable so Nginx doesn't crash on startup if backend is slow
            set $backend_url http://backend_api;
            proxy_pass $backend_url;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}