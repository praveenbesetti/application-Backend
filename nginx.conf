events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Define the connection to your Node.js/Express backend
    upstream backend_api {
        # 'survey-backend' is the service name if using Docker, 
        # otherwise use '127.0.0.1:5000'
        server survey-backend:5000;
    }

    # 1. HTTP Server: Redirects all traffic to HTTPS
    server {
        listen 80;
        server_name myfarmapp.duckdns.org;

        # Health check endpoint for testing without SSL
        location /health {
            return 200 'Nginx is operational (HTTP)';
            add_header Content-Type text/plain;
        }

        # Redirect all other HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS Server: Handles secure SSL traffic
    server {
        listen 443 ssl;
        server_name myfarmapp.duckdns.org;

        # SSL Certificate paths (Generated by Certbot)
        ssl_certificate /etc/letsencrypt/live/myfarmapp.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfarmapp.duckdns.org/privkey.pem;

        # Recommended Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Proxy requests to the MERN backend
        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Pass real visitor information to your Express logs
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}