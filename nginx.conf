events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimization settings
    sendfile        on;
    keepalive_timeout  65;

    # Define the backend connection
    # 'survey-backend' must match the service name in your docker-compose.yml
    upstream backend_api {
        server survey-backend:5000;
    }

    server {
        listen 80;
        server_name web-app-backend.duckdns.org;

        # Health check for the load balancer or testing
        location /health {
            return 200 'Nginx is alive';
            add_header Content-Type text/plain;
        }

        # Proxy requests to your MERN backend
        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # UNCOMMENT THIS SECTION ONLY AFTER YOU INSTALL CERTBOT/SSL
    /*
    server {
        listen 443 ssl;
        server_name web-app-backend.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/web-app-backend.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/web-app-backend.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
    */
}