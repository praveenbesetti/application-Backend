<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo Data Upload</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a202c;
      text-align: center;
    }

    h1 span {
      color: #3b82f6;
    }

    /* ── Drop Zone ── */
    #drop-zone {
      border: 2.5px dashed #93c5fd;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      background: #eff6ff;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    #drop-zone.dragover {
      background: #dbeafe;
      border-color: #3b82f6;
    }

    #drop-zone svg {
      width: 48px;
      height: 48px;
      color: #3b82f6;
      margin-bottom: 12px;
    }

    #drop-zone p {
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    #drop-zone strong {
      color: #3b82f6;
    }

    #file-input {
      display: none;
    }

    /* ── File Name Tag ── */
    #file-name {
      display: none;
      align-items: center;
      gap: 10px;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.9rem;
      color: #334155;
    }

    #file-name svg {
      flex-shrink: 0;
      color: #3b82f6;
    }

    #file-name span {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #clear-file {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
    }

    #clear-file:hover { color: #ef4444; }

    /* ── Upload Button ── */
    #upload-btn {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    #upload-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #upload-btn:not(:disabled):hover { background: #2563eb; }

    /* ── Loader ── */
    #loader {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #3b82f6;
      font-size: 0.95rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #bfdbfe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Message ── */
    #message {
      display: none;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    #message.success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }

    #message.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    #message ul {
      margin-top: 8px;
      padding-left: 18px;
      font-size: 0.82rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Geo Data <span>CSV Upload</span></h1>

  <!-- Drop Zone -->
  <div id="drop-zone" role="button" tabindex="0" aria-label="Drop CSV file here or click to browse">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0L8.5 7.5M12 4l3.5 3.5"/>
    </svg>
    <p><strong>Drag & drop</strong> your CSV file here<br/>or <strong>click to browse</strong></p>
    <input type="file" id="file-input" accept=".csv,.xlsx" />
  </div>

  <!-- Selected File Name -->
  <div id="file-name">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9 12h6m-6 4h6m2 4H7a2 2 0 01-2-2V6a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z"/>
    </svg>
    <span id="file-label"></span>
    <button id="clear-file" title="Remove file">✕</button>
  </div>

  <!-- Upload Button -->
  <button id="upload-btn" disabled>Upload & Process</button>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    Processing file, please wait…
  </div>

  <!-- Result Message -->
  <div id="message"></div>
</div>

<script>
  const dropZone   = document.getElementById("drop-zone");
  const fileInput  = document.getElementById("file-input");
  const fileNameEl = document.getElementById("file-name");
  const fileLabel  = document.getElementById("file-label");
  const clearBtn   = document.getElementById("clear-file");
  const uploadBtn  = document.getElementById("upload-btn");
  const loader     = document.getElementById("loader");
  const message    = document.getElementById("message");

  let selectedFile = null;

  // ── File selection helpers ──────────────────────────────────────
  function setFile(file) {
    const validExt = file && (file.name.endsWith(".csv") || file.name.endsWith(".xlsx"));
    if (!validExt) {
      showMessage("error", "Please select a valid .csv or .xlsx file.");
      return;
    }
    selectedFile = file;
    fileLabel.textContent = file.name;
    fileNameEl.style.display = "flex";
    uploadBtn.disabled = false;
    hideMessage();
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = "";
    fileNameEl.style.display = "none";
    uploadBtn.disabled = true;
    hideMessage();
  }

  // ── Drag & Drop ────────────────────────────────────────────────
  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });

  dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", ()  => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  clearBtn.addEventListener("click",   (e) => { e.stopPropagation(); clearFile(); });

  // ── Upload ─────────────────────────────────────────────────────
  uploadBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    loader.style.display = "flex";
    hideMessage();

    const formData = new FormData();
    formData.append("csv", selectedFile);

    try {
      const res  = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();

      if (data.success) {
        let html = `<strong>✅ Success!</strong><br/>${data.message}`;
        if (data.details && data.details.length) {
          html += `<ul>${data.details.map(e => `<li>${e}</li>`).join("")}</ul>`;
        }
        showMessage("success", html);
        clearFile();
      } else {
        showMessage("error", `<strong>❌ Failed:</strong> ${data.message}`);
        uploadBtn.disabled = false;
      }
    } catch (err) {
      showMessage("error", `<strong>❌ Network error:</strong> ${err.message}`);
      uploadBtn.disabled = false;
    } finally {
      loader.style.display = "none";
    }
  });

  // ── Message helpers ────────────────────────────────────────────
  function showMessage(type, html) {
    message.className = type;
    message.innerHTML = html;
    message.style.display = "block";
  }

  function hideMessage() {
    message.style.display = "none";
    message.innerHTML = "";
  }
</script>

</body>
</html>
